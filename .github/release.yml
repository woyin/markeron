# GitHub auto-generated release notes configuration.
# Used by repos.generateReleaseNotes in the Release workflow.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    authors:
      - dependabot[bot]
      - dependabot
    labels:
      - ignore-for-release
  categories:
    - title: ✨ New
      labels:
        - enhancement
        - feature
    - title: 🛠 Fixes
      labels:
        - bug
        - fix
    - title: 🧹 Improvements
      labels:
        - improvement
        - refactor
        - performance
        - ui
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 👷 CI
      labels:
        - ci
