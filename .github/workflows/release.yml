name: Release

on:
  push:
    tags: ['v*']

jobs:
  release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      body: ${{ steps.notes.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: notes
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { execSync } = require('child_process');
            const tag = context.ref.replace('refs/tags/', '');

            const headingMap = new Map([
              ["What's Changed", "What's New"],
              ["What's New", "What's New"],
              ["Features", "✨ New"],
              ["New Features", "✨ New"],
              ["New", "✨ New"],
              ["Exciting New Features", "✨ New"],
              ["Bug Fixes", "🛠 Fixes"],
              ["Fixes", "🛠 Fixes"],
              ["Improvements", "🧹 Improvements"],
              ["Updates", "🔄 Updates"],
              ["Linux", "🐧 Linux"],
              ["Security", "🔐 Security"],
              ["Documentation", "📚 Documentation"],
              ["CI", "👷 CI"],
            ]);

            function formatLine(subject) {
              const match = subject.match(/^(feat|fix|hotfix|docs|ui|refactor|perf|ci|build|chore|i18n|security)(?:\([^)]+\))?!?:\s*(.+)$/i);
              if (!match) return subject.trim();
              const [, type, desc] = match;
              const text = desc.charAt(0).toUpperCase() + desc.slice(1).replace(/\.$/, '');
              const prefixMap = {
                feat: 'Added',
                fix: 'Fixed',
                hotfix: 'Fixed',
                docs: 'Documented',
                ui: 'Updated UI:',
                refactor: 'Refactored',
                perf: 'Improved performance:',
                ci: 'Updated CI:',
                build: 'Updated build:',
                chore: 'Updated',
                i18n: 'Updated i18n:',
                security: 'Fixed security:',
              };
              const prefix = prefixMap[type.toLowerCase()] || 'Updated';
              if (prefix.endsWith(':')) return `${prefix} ${text}.`;
              return `${prefix} ${text.charAt(0).toLowerCase() + text.slice(1)}.`;
            }

            function buildFromGitLog() {
              let prevTag = '';
              try {
                prevTag = execSync(`git describe --tags --abbrev=0 ${tag}^`, { encoding: 'utf8' }).trim();
              } catch {
                return '';
              }

              const subjects = execSync(`git log ${prevTag}..${tag} --pretty=format:%s`, { encoding: 'utf8' })
                .split('\n')
                .map((s) => s.trim())
                .filter(Boolean);

              const buckets = new Map([
                ['✨ New', []],
                ['🛠 Fixes', []],
                ['🧹 Improvements', []],
                ['📚 Documentation', []],
                ['👷 CI', []],
              ]);

              for (const subject of subjects) {
                if (/^chore\(release\):/i.test(subject)) continue;
                const lower = subject.toLowerCase();
                let bucket = '🧹 Improvements';
                if (lower.startsWith('feat')) bucket = '✨ New';
                else if (lower.startsWith('fix') || lower.startsWith('hotfix')) bucket = '🛠 Fixes';
                else if (lower.startsWith('docs')) bucket = '📚 Documentation';
                else if (lower.startsWith('ci') || lower.startsWith('build')) bucket = '👷 CI';
                buckets.get(bucket).push(formatLine(subject));
              }

              let body = `## What's New in ${tag}\n\n`;
              for (const [title, items] of buckets) {
                if (!items.length) continue;
                body += `### ${title}\n`;
                for (const item of items) body += `- ${item}\n`;
                body += '\n';
              }
              body += `**Full Changelog**: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${prevTag}...${tag}\n`;
              return body;
            }

            let body = '';
            try {
              const { data } = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                configuration_file_path: '.github/release.yml',
              });
              body = data.body || '';
              if (body.includes('###')) {
                body = body.replace(/^###\s+(.*)$/gm, (_, heading) => {
                  const nextHeading = headingMap.get(heading.trim()) ?? heading.trim();
                  return `### ${nextHeading}`;
                });
                if (!body.startsWith('## What')) {
                  body = `## What's New in ${tag}\n\n${body}`;
                }
              }
            } catch (error) {
              core.info(`generateReleaseNotes failed: ${error.message}`);
            }

            if (!body.includes('###')) {
              body = buildFromGitLog();
            }

            if (!body.trim()) {
              body = `## What's New in ${tag}\n\nSee the assets below to download and install.\n`;
            }

            return body;

  build:
    needs: release-notes
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            slug: windows
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            slug: macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            slug: macos-x64
          - platform: ubuntu-24.04
            args: ''
            slug: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - run: npm ci

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libxcb-shm0-dev libxcb-randr0-dev libpipewire-0.3-dev libgbm-dev libegl-dev libwayland-dev

      - name: Configure macOS ad-hoc signing
        if: matrix.platform == 'macos-latest'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Import code-signing certificate (Windows)
        if: matrix.platform == 'windows-latest'
        id: codesign
        shell: powershell
        env:
          SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: |
          if ($env:SIGN_PFX_BASE64) {
            $pfxBytes = [Convert]::FromBase64String($env:SIGN_PFX_BASE64)
            $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
            $securePass = ConvertTo-SecureString -String $env:SIGN_PFX_PASSWORD -Force -AsPlainText
            Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePass
            Remove-Item $pfxPath
            Write-Host "Certificate imported — signing enabled"
            "sign_args=-c src-tauri/tauri.sign.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "No signing certificate — build will be unsigned"
            "sign_args=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkerOn ${{ github.ref_name }}'
          releaseBody: ${{ needs.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
          args: ${{ matrix.args }} ${{ steps.codesign.outputs.sign_args }}

      - name: Stash updater fragment
        shell: bash
        run: |
          # tauri-action writes latest.json to the project root (not under bundle/)
          if [ -f latest.json ]; then
            cp latest.json "updater-${{ matrix.slug }}.json"
          else
            echo "Updater fragment not found after build (expected ./latest.json)"
            find . -name 'latest.json' 2>/dev/null || true
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.slug }}
          path: updater-${{ matrix.slug }}.json
          if-no-files-found: error

      - name: Build MSIX
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: bash scripts/build-msix.sh

      - name: Upload MSIX to release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSIX=$(ls src-tauri/target/release/bundle/msix/*.msix)
          gh release upload "${{ github.ref_name }}" "$MSIX" --clobber

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          path: updater-fragments
          merge-multiple: true

      - name: Merge updater JSON
        run: node scripts/merge-updater-json.mjs updater-fragments merged-latest.json

      - name: Consolidate release assets and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/consolidate-github-release.mjs "${{ github.ref_name }}" merged-latest.json
